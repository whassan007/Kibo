architecture:
  name: "KIBO OS"
  version: "5.1.0"
  method: "W-Method"
  layers:
    - layer: 1
      name: "Attract"
      crew: "herald"
      gate: "none"
      gate_type: "none"
    - layer: 2
      name: "Acquire"
      crew: "scout"
      gate: "human_handshake"
      gate_type: "human"
    - layer: 3
      name: "Diagnose"
      crew: "diagnostician"
      gate: "audit_report_generation"
      gate_type: "artifact"
    - layer: 4
      name: "Agree"
      crew: "steward"
      gate: "human_signs_terms"
      gate_type: "human"
    - layer: 5
      name: "Install"
      crew: "installer"
      gate: "human_approves_production"
      gate_type: "human"
    - layer: 6
      name: "Operate"
      crew: "operator"
      gate: "telemetry_baseline"
      gate_type: "artifact"
    - layer: 7
      name: "Compound"
      crew: "forge"
      gate: "human_promotes_proposal"
      gate_type: "human"
